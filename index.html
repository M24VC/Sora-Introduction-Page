<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SORA | 穹之空 - 經典美學版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/wallet.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof render === 'function') {
        render();
      }
    });
  </script>
  <script type="module">
    import { createAppKit } from "https://esm.sh/@reown/appkit@1.9.0";
    import * as networks from "https://esm.sh/@reown/appkit@1.9.0/networks";
    
    window.createAppKit = createAppKit;
    window.appkitNetworks = Object.values(networks);
    
    console.log('AppKit loaded via ESM');

    window.addEventListener('load', () => {
      setInterval(() => {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = (Math.random() * 5 + 5) + 'px';
        p.style.animationDuration = (Math.random() * 6 + 6) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 12000);
      }, 2000);
    });
  </script>
</head>
<body class="min-h-screen">
  <div class="aurora">
    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s; width: 600px;"></div>
  </div>

  <header class="fixed top-0 inset-x-0 z-50 p-6">
    <div class="max-w-md mx-auto glass-panel h-14 rounded-[22px] flex justify-between items-center px-5">
      <button onclick="toggleSideMenu(true)" class="w-10 h-10 flex items-center justify-center text-xl opacity-60">≡</button>
      <div onclick="navigate('home')" class="serif font-black text-2xl tracking-tighter cursor-pointer bg-gradient-to-r from-blue-400 to-pink-400 bg-clip-text text-transparent">SORA</div>
      <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-red-400 border-2 border-white shadow-[0_0_10px_rgba(248,113,113,0.5)]"></div>
    </div>
  </header>

  <div id="side-overlay" class="fixed inset-0 bg-black/10 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-500" onclick="toggleSideMenu(false)"></div>
  <aside id="side-drawer" class="fixed inset-y-0 left-0 w-72 glass-panel z-[70] p-10 translate-x-[-100%] transition-transform duration-500 rounded-r-[40px]">
    <div class="flex justify-between items-center mb-12">
      <span class="serif text-sm opacity-20 italic font-black uppercase tracking-widest">Index</span>
      <button onclick="toggleSideMenu(false)" class="text-3xl font-light opacity-30">×</button>
    </div>
    <nav class="space-y-6">
      <button onclick="navigate('about')" class="group flex items-center gap-4 w-full text-left font-black text-lg hover:translate-x-2 transition-all">📖 關於 SORA</button>
      <button onclick="navigate('nft')" class="group flex items-center gap-4 w-full text-left font-black text-lg hover:translate-x-2 transition-all text-pink-400">💎 穹之收藏</button>
      <button onclick="navigate('airdrop')" class="group flex items-center gap-4 w-full text-left font-black text-lg hover:translate-x-2 transition-all">🎁 領取份額</button>
      <button onclick="navigate('cycle')" class="group flex items-center gap-4 w-full text-left font-black text-lg hover:translate-x-2 transition-all">♻️ 循環機制</button>
      <button onclick="navigate('gallery')" class="group flex items-center gap-4 w-full text-left font-black text-lg hover:translate-x-2 transition-all">🎨 穹之畫廊</button>
    </nav>
    <div class="absolute bottom-10 left-10 right-10">
      <button onclick="toggleTheme()" class="w-full py-4 glass-panel rounded-2xl text-[10px] font-black uppercase tracking-[0.3em]">切換風格</button>
    </div>
  </aside>

  <main id="app-content" class="max-w-md mx-auto px-7 pt-28 pb-36 min-h-screen">
  </main>

  <nav class="fixed bottom-8 inset-x-8 z-50">
    <div class="max-w-md mx-auto glass-panel h-16 rounded-[30px] flex items-center justify-around px-4 shadow-2xl">
      <button onclick="navigate('home')" id="nav-home" class="flex-1 flex flex-col items-center gap-1.5 transition-all">
        <span class="text-xl">🏠</span>
        <span class="text-[8px] font-black uppercase tracking-widest opacity-40">Home</span>
      </button>
      <button onclick="navigate('nft')" id="nav-nft" class="flex-1 flex flex-col items-center gap-1.5 transition-all">
        <span class="text-xl">💎</span>
        <span class="text-[8px] font-black uppercase tracking-widest opacity-40">Mint</span>
      </button>
      <button onclick="navigate('airdrop')" id="nav-airdrop" class="flex-1 flex flex-col items-center gap-1.5 transition-all">
        <span class="text-xl">🎁</span>
        <span class="text-[8px] font-black uppercase tracking-widest opacity-40">Alloc</span>
      </button>
      <button onclick="navigate('profile')" id="nav-profile" class="flex-1 flex flex-col items-center gap-1.5 transition-all">
        <span class="text-xl">👤</span>
        <span class="text-[8px] font-black uppercase tracking-widest opacity-40">User</span>
      </button>
    </div>
  </nav>
</body>
</html>
